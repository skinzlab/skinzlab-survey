<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skinzlab · 뷰티 데이터 플랫폼 사전 설문</title>
<meta name="description" content="2~3분 소요 총 18문항. 뷰티 데이터 플랫폼 사전 설문에 참여해주세요.">
<meta property="og:title" content="Skinzlab">
<meta property="og:description" content="뷰티 데이터 플랫폼 사전 설문 · 2~3분 소요 총 18문항">
<meta property="og:type" content="website">
<meta property="og:url" content="https://skinzlab-survey.vercel.app">
<meta property="og:image" content="https://skinzlab-survey.vercel.app/og-image.png">
<meta property="og:image:width" content="800">
<meta property="og:image:height" content="400">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000; --dark: #111111; --white: #ffffff;
    --cream: #fafafa; --gray: #888888; --lightgray: #e5e5e5;
    --text: #111111; --muted: #888888;
    --sec1: #111111; --sec2: #333333; --sec3: #555555; --sec4: #111111;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR',sans-serif; background:var(--cream); color:var(--text); line-height:1.7; -webkit-font-smoothing:antialiased; }
  button { font-family:inherit; }

  .hero-img { width:100%; display:block; padding:40px 20px; background:#000; object-fit:contain; }
  .hero-text { background:var(--black); padding:16px 24px 20px; text-align:center; }
  .hero-text h1 { color:var(--white); font-size:20px; font-weight:400; margin-bottom:6px; line-height:1.5; letter-spacing:-0.3px; }
  .hero-text .sub { color:rgba(255,255,255,.5); font-size:13px; font-weight:300; margin-bottom:22px; }
  .prog-wrap { max-width:400px; margin:0 auto; }
  .prog-top { display:flex; justify-content:space-between; margin-bottom:6px; }
  .prog-top span:first-child { color:rgba(255,255,255,.5); font-size:12px; }
  .prog-top span:last-child { color:var(--white); font-size:12px; font-weight:600; }
  .prog-bar { background:rgba(255,255,255,.15); border-radius:8px; height:4px; }
  .prog-fill { background:var(--white); height:4px; border-radius:8px; transition:width .3s; }

  .tabs { display:flex; overflow-x:auto; background:#fff; border-bottom:1px solid var(--lightgray); }
  .tabs button { flex:1; min-width:80px; padding:12px 8px; border:none; cursor:pointer; font-size:12px; background:#fff; color:var(--muted); border-bottom:2px solid transparent; transition:all .2s; white-space:nowrap; }
  .tabs button.active { background:#fff; font-weight:700; color:var(--black); border-bottom-color:var(--black); }

  .container { max-width:720px; margin:0 auto; padding:24px 16px 40px; }
  .qcard { background:#fff; border-radius:12px; padding:22px 20px; margin-bottom:14px; border:1px solid var(--lightgray); }
  .qlabel { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1.5px; margin-bottom:6px; }
  .qlabel .req { background:#fee2e2; color:#dc2626; font-size:10px; font-weight:700; padding:1px 7px; border-radius:10px; margin-left:8px; }
  .qlabel .multi { background:#f0f0f0; color:#555; font-size:10px; padding:1px 7px; border-radius:10px; margin-left:6px; }
  .qtext { font-size:15px; font-weight:600; color:var(--black); margin-bottom:14px; line-height:1.6; }

  .opt { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:8px; border:1.5px solid var(--lightgray); background:#fafafa; cursor:pointer; font-size:14px; color:#374151; transition:all .15s; user-select:none; margin-bottom:7px; }
  .opt:hover { border-color:#ccc; }
  .opt.sel { font-weight:600; border-color:var(--black); background:rgba(0,0,0,.03); color:var(--black); }
  .opt .dot { width:18px; height:18px; border:2px solid #ccc; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
  .opt .dot.radio { border-radius:50%; }
  .opt .dot.check { border-radius:4px; }
  .opt.sel .dot { background:var(--black); border-color:var(--black); }
  .opt.sel .dot::after { content:''; display:block; width:8px; height:8px; background:#fff; }
  .opt.sel .dot.radio::after { border-radius:50%; }
  .opt.sel .dot.check::after { border-radius:2px; }

  .scale-row { display:flex; gap:8px; }
  .scale-item { flex:1; text-align:center; padding:12px 4px 8px; border-radius:10px; border:1.5px solid var(--lightgray); background:#fafafa; cursor:pointer; transition:all .15s; user-select:none; }
  .scale-item:hover { border-color:#ccc; }
  .scale-item .num { font-size:18px; font-weight:700; color:var(--black); }
  .scale-item .lbl { font-size:10px; color:var(--muted); margin-top:2px; line-height:1.3; }
  .scale-item.sel { background:var(--black); border-color:var(--black); }
  .scale-item.sel .num { color:#fff; }
  .scale-item.sel .lbl { color:rgba(255,255,255,.7); }

  textarea, input[type=email] { width:100%; border:1.5px solid var(--lightgray); border-radius:8px; padding:12px 14px; font-size:14px; font-family:inherit; background:#fafafa; outline:none; color:#374151; box-sizing:border-box; transition:border .2s; }
  textarea { resize:none; height:80px; }
  textarea:focus, input[type=email]:focus { border-color:var(--black); }

  .note { margin-top:10px; padding:7px 12px; background:#f5f5f5; border-radius:6px; border-left:3px solid #ccc; font-size:12px; color:#666; }

  .nav-row { display:flex; gap:12px; margin-top:8px; }
  .btn { padding:14px; border-radius:10px; border:none; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; }
  .btn-outline { border:2px solid var(--black); background:#fff; color:var(--black); }
  .btn-primary { background:var(--black); color:#fff; }
  .btn:disabled { background:#ccc; cursor:not-allowed; }

  .fb-status { text-align:center; margin-top:16px; }
  .fb-dot { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
  .fb-dot::before { content:''; width:6px; height:6px; border-radius:50%; background:#22c55e; }

  /* Done */
  .done-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:var(--black); }
  .done-card { background:#fff; border-radius:20px; padding:48px 36px; text-align:center; max-width:480px; }
  .done-card .icon { font-size:56px; margin-bottom:16px; }
  .done-card h2 { color:var(--black); font-size:22px; font-weight:700; margin-bottom:12px; }
  .done-card p { color:var(--muted); font-size:14px; line-height:1.8; margin-bottom:28px; }
  .done-info { background:#f5f5f5; border-radius:12px; padding:16px 20px; margin-bottom:28px; text-align:left; }

  /* Results */
  .res-header { background:var(--black); padding:28px 24px; text-align:center; }
  .res-header h1 { color:#fff; font-size:22px; font-weight:700; margin-bottom:6px; }
  .res-header p { color:rgba(255,255,255,.5); font-size:13px; }
  .res-badge { display:inline-block; background:#fff; color:var(--black); font-weight:700; font-size:16px; padding:8px 24px; border-radius:20px; margin-top:12px; }
  .sec-title { display:flex; align-items:center; gap:12px; margin:32px 0 16px; }
  .sec-bar { width:10px; height:32px; border-radius:4px; }
  .sec-title span { font-size:16px; font-weight:700; color:var(--black); }
  .bar-wrap { background:#f0f0f0; border-radius:6px; height:8px; margin-top:4px; }
  .bar-fill { height:8px; border-radius:6px; transition:width .6s ease; }
  .email-list { margin-top:24px; background:#fff; border-radius:14px; padding:20px; border:2px solid #22c55e; }
  .email-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:#f0fdf4; border-radius:8px; border-left:3px solid #22c55e; margin-bottom:8px; }
  .err-box { background:#fef2f2; border:1px solid #fecaca; border-radius:12px; padding:16px 20px; margin-bottom:16px; }

  @media(max-width:480px) {
    .hero-text h1 { font-size:18px; }
    .scale-row { gap:4px; }
    .scale-item { padding:10px 2px 6px; }
    .scale-item .num { font-size:16px; }
  }
</style>
</head>

const FIREBASE_PROJECT_ID = "skinzlab-msti";
const FIRESTORE_BASE = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents`;

const firestoreAPI = {
  async addResponse(answers) {
    const url = `${FIRESTORE_BASE}/responses?key=${FIREBASE_API_KEY}`;
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fields: {
        data: { stringValue: JSON.stringify(answers) },
        submitted_at: { integerValue: String(Date.now()) },
      }}),
    });
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error?.message || `Error ${res.status}`);
    return res.json();
  },
  async getAllResponses() {
    const url = `${FIRESTORE_BASE}/responses?key=${FIREBASE_API_KEY}&pageSize=1000`;
    const res = await fetch(url);
    if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error?.message || `Error ${res.status}`);
    const json = await res.json();
    if (!json.documents) return [];
    return json.documents.map(doc => { try { return JSON.parse(doc.fields.data.stringValue); } catch { return null; } }).filter(Boolean);
  },
};

    { id:"q_pain", text:"기존 리뷰 플랫폼에서 불편하거나 신뢰가 가지 않는 부분이 있으신가요?", type:"multi", required:true, options:["광고·협찬 리뷰가 너무 많다","나와 피부 타입이 다른 사람의 리뷰가 섞여 있다","리뷰가 많아도 내 피부에 맞는지 모르겠다","인기 제품 리뷰만 노출되어 다양성이 없다","특별히 불편한 점 없다"] },

    { id:"q_howknow", text:"현재 피부 타입을 어떻게 파악하고 계신가요?", type:"multi", options:["피부과·에스테틱에서 진단","앱·온라인 자가 진단 테스트","오래 쓴 경험으로 스스로 판단","건성/지성/복합/민감 정도만 안다","잘 모른다"] },

  ]},
  { id:"concept", label:"선호도", color:"#111", num:4, questions:[
    { id:"q_intent", text:"나와 피부가 비슷한 사람의 후기만 따로 볼 수 있다면, 도움이 될 것 같으신가요?", type:"scale", required:true, options:["1\n전혀\n없음","2","3\n보통","4","5\n매우\n도움"] },

    { id:"q_trust", text:"이 기능이 있다면 기존 플랫폼보다 더 신뢰할 수 있을 것 같으신가요?", type:"single", options:["훨씬 더 신뢰할 것 같다","조금 더 신뢰할 것 같다","비슷할 것 같다","잘 모르겠다"] },
    { id:"q_nps", text:"이 플랫폼이 출시되면 주변에 추천할 의향이 있으신가요?", type:"scale", options:["1\n전혀\n없음","2","3\n보통","4","5\n꼭\n추천"] },
    { id:"q_open", text:"기대되는 점 또는 걱정되는 점을 자유롭게 적어주세요. (선택)", type:"open" },
    { id:"q_beta", text:"사전 오픈 베타 테스터에 참여할 의향이 있으신가요?", type:"single", options:["꼭 참여하고 싶다","관심 있다 (정식 출시 시 사용 예정)","잘 모르겠다","참여 의향 없다"] },
    { id:"q_email", text:"이메일 주소를 남겨주시면 베타 오픈 시 가장 먼저 연락드릴게요! 📩", type:"email", showIf:{ qId:"q_beta", values:["꼭 참여하고 싶다","관심 있다 (정식 출시 시 사용 예정)"] } },
  ]},
];

const ALL_Q = SECTIONS.flatMap(s => s.questions);
const TOTAL = ALL_Q.length;

function App() {
  const [view, setView] = useState("survey");
  const [answers, setAnswers] = useState({});
  const [sec, setSec] = useState(0);
  const [submitting, setSubmitting] = useState(false);
  const [totalResp, setTotalResp] = useState(0);
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [fbErr, setFbErr] = useState(null);

  const isAdmin = new URLSearchParams(window.location.search).get("admin") === "skinzlab";
  const section = SECTIONS[sec];

  const handleAnswer = (qId, value, type, max) => {
    if (type === "multi") {
      const prev = answers[qId] || [];
      if (prev.includes(value)) setAnswers(a => ({...a, [qId]: prev.filter(v=>v!==value)}));
      else { if (max && prev.length >= max) return; setAnswers(a => ({...a, [qId]: [...prev, value]})); }
    } else setAnswers(a => ({...a, [qId]: value}));
  };

  const isValid = () => section.questions.every(q => {
    if (!q.required) return true;
    const a = answers[q.id];
    return a && (!Array.isArray(a) || a.length > 0);
  });

  const handleSubmit = async () => {
    setSubmitting(true); setFbErr(null);
    try {
      await firestoreAPI.addResponse({...answers, submitted_at: Date.now()});
      const all = await firestoreAPI.getAllResponses();
      setTotalResp(all.length); setView("done");
    } catch(e) { setFbErr(e.message); alert("제출 오류: " + e.message); }
    setSubmitting(false);
  };

  const loadResults = async () => {
    setLoading(true); setFbErr(null);
    try {
      const all = await firestoreAPI.getAllResponses();
      const agg = {};
      ALL_Q.forEach(q => { agg[q.id] = {}; if (q.options) q.options.forEach(o => { agg[q.id][o.replace(/\n/g,' ')] = 0; }); });
      all.forEach(r => { ALL_Q.forEach(q => { const v = r[q.id]; if (!v) return;
        if (Array.isArray(v)) v.forEach(x => { if(agg[q.id][x]!==undefined) agg[q.id][x]++; });
        else if (q.type!=='open'&&q.type!=='email') { const k=String(v).replace(/\n/g,' '); if(agg[q.id][k]!==undefined) agg[q.id][k]++; }
      });});
      setResults({ count: all.length, agg, responses: all });
    } catch(e) { setFbErr(e.message); }
    setLoading(false);
  };

  useEffect(() => { if (view==="results") loadResults(); }, [view]);

  const answered = Object.keys(answers).filter(k => { const v=answers[k]; return v&&(Array.isArray(v)?v.length>0:true); }).length;
  const progress = Math.round((answered/TOTAL)*100);

  // ─── SURVEY ─────────────────────────────────
  if (view === "survey") return (
    <div>
      <img src={BANNER_IMG} className="hero-img" alt="Skinzlab"/>
      <div className="hero-text">
        <p style={{color:"rgba(255,255,255,.45)",fontSize:13,fontWeight:300,marginBottom:16}}>총 3분 · {TOTAL}문항</p>
        <div className="prog-wrap">
          <div className="prog-top"><span>응답 현황</span><span>{answered}/{TOTAL}</span></div>
          <div className="prog-bar"><div className="prog-fill" style={{width:`${progress}%`}}/></div>
        </div>
      </div>

      <div className="tabs">
        {SECTIONS.map((s,i) => (
          <button key={s.id} className={sec===i?"active":""} onClick={()=>{setSec(i);document.querySelector('.tabs').scrollIntoView({behavior:'smooth'});}}>
            {s.num}. {s.label}
          </button>
        ))}
      </div>

      <div className="container">
        {section.questions.map((q,qi) => {
          const gi = SECTIONS.slice(0,sec).reduce((a,s)=>a+s.questions.length,0)+qi+1;
          return (
            <div key={q.id} className="qcard">
              <div className="qlabel">
                Q{gi}
                {q.required && <span className="req">필수</span>}
                {q.type==="multi" && <span className="multi">복수선택{q.max?` 최대${q.max}개`:""}</span>}
              </div>
              <div className="qtext">{q.text}</div>

              {(q.type==="single"||q.type==="multi") && q.options.map(opt => {
                const sel = q.type==="multi"?(answers[q.id]||[]).includes(opt):answers[q.id]===opt;
                return (
                  <div key={opt} className={`opt ${sel?"sel":""}`} onClick={()=>handleAnswer(q.id,opt,q.type,q.max)}>
                    <div className={`dot ${q.type==="multi"?"check":"radio"}`}/>
                    {opt}
                  </div>
                );
              })}

              {q.type==="scale" && (
                <div className="scale-row">
                  {q.options.map((opt,i) => {
                    const val=String(i+1); const sel=answers[q.id]===val;
                    return (
                      <div key={i} className={`scale-item ${sel?"sel":""}`} onClick={()=>handleAnswer(q.id,val,"single")}>
                        <div className="num">{i+1}</div>
                        {opt.split("\n").slice(1).map((l,j)=><div key={j} className="lbl">{l}</div>)}
                      </div>
                    );
                  })}
                </div>
              )}

              {q.type==="open" && <textarea value={answers[q.id]||""} onChange={e=>setAnswers(a=>({...a,[q.id]:e.target.value}))} placeholder="자유롭게 작성해 주세요..."/>}

              {q.type==="email" && (()=>{
                const show = q.showIf?(q.showIf.values||[]).includes(answers[q.showIf.qId]):true;
                if (!show) return null;
                const v=answers[q.id]||""; const ok=!v||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
                return (<div>
                  <div style={{marginBottom:10}}><span style={{background:"#f0f0f0",color:"#555",fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:10}}>베타 참여 의향자 전용</span></div>
                  <input type="email" value={v} onChange={e=>setAnswers(a=>({...a,[q.id]:e.target.value}))} placeholder="example@email.com" style={!ok?{borderColor:"#f87171"}:v?{borderColor:"#22c55e"}:{}}/>
                  {!ok && <div style={{fontSize:12,color:"#ef4444",marginTop:6}}>올바른 이메일 형식을 입력해 주세요.</div>}
                  {v&&ok && <div style={{fontSize:12,color:"#16a34a",marginTop:6}}>✅ 입력 완료! 베타 오픈 시 연락드릴게요.</div>}
                  <div style={{fontSize:12,color:"#999",marginTop:8}}>* 이메일은 베타 테스트 안내 외 다른 목적으로 사용되지 않습니다.</div>
                </div>);
              })()}

              {q.note && <div className="note">{q.note}</div>}
            </div>
          );
        })}

        <div className="nav-row">
          {sec>0 && <button className="btn btn-outline" style={{flex:1}} onClick={()=>{setSec(s=>s-1);document.querySelector('.tabs').scrollIntoView({behavior:'smooth'});}}>← 이전</button>}
          {sec<SECTIONS.length-1 ? (
            <button className="btn" style={{flex:2,background:isValid()?"#111":"#ccc",color:"#fff"}}
              onClick={()=>{if(isValid()){setSec(s=>s+1);document.querySelector('.tabs').scrollIntoView({behavior:'smooth'});}else alert("필수 항목을 모두 응답해 주세요.");}}>다음 섹션 →</button>
          ) : (
            <button className="btn btn-primary" style={{flex:2}} onClick={handleSubmit} disabled={submitting}>
              {submitting?"제출 중...":"제출하기"}
            </button>
          )}
        </div>

        <div className="fb-status"><span className="fb-dot">Skinzlab</span></div>
      </div>
    </div>
  );

  // ─── DONE ───────────────────────────────────
  if (view === "done") return (
    <div className="done-wrap">
      <div className="done-card">
        <h2 style={{marginBottom:20}}>참여해주셔서 감사합니다.</h2>
        <img src={END_IMG} style={{width:"100%",borderRadius:12,marginBottom:28}} alt="Skinzlab Beauty Database"/>
        <div style={{fontSize:13,color:"#999",marginBottom:24}}>문의처 : hello@skinzlab.co</div>
        <button className="btn btn-primary" style={{width:"100%",marginBottom:10}} onClick={()=>{setAnswers({});setSec(0);setView("survey");}}>처음으로 돌아가기</button>
        {isAdmin && <button className="btn btn-outline" style={{width:"100%"}} onClick={()=>setView("results")}>📊 실시간 결과 확인하기</button>}
      </div>
    </div>
  );

  // ─── RESULTS (admin only) ───────────────────
  if (view === "results") {
    if (!isAdmin) { setView("survey"); return null; }
    return (
    <div>
      <div className="res-header">
        <h1>📊 실시간 설문 결과</h1>
        <p>Skinzlab 사전 설문 · Admin</p>
        {results && <div className="res-badge">총 {results.count}명 응답</div>}
      </div>
      <div className="container">
        {fbErr && <div className="err-box">
          <div style={{fontSize:13,fontWeight:700,color:"#dc2626",marginBottom:6}}>⚠️ Firebase 연결 오류</div>
          <div style={{fontSize:12,color:"#991b1b"}}>{fbErr}</div>
        </div>}

        {loading ? <div style={{textAlign:"center",padding:60,color:"#888"}}>데이터 불러오는 중...</div>
        : results && results.count===0 ? <div style={{textAlign:"center",padding:60}}><div style={{fontSize:40,marginBottom:16}}>📭</div><p style={{color:"#888"}}>아직 응답이 없어요.</p></div>
        : results ? SECTIONS.map(s => (
          <div key={s.id}>
            <div className="sec-title"><div className="sec-bar" style={{background:s.color}}/><span>섹션 {s.num}. {s.label}</span></div>
            {s.questions.filter(q=>q.type!=="open"&&q.type!=="email").map((q,qi) => {
              const gi=SECTIONS.slice(0,SECTIONS.indexOf(s)).reduce((a,x)=>a+x.questions.length,0)+qi+1;
              const d=results.agg[q.id]||{}; const t=results.count; const entries=Object.entries(d); const mx=Math.max(...entries.map(([,v])=>v),1);
              return (
                <div key={q.id} className="qcard">
                  <div style={{fontSize:11,color:"#888",fontWeight:700,letterSpacing:1,marginBottom:6}}>Q{gi}</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#111",marginBottom:16,lineHeight:1.5}}>{q.text}</div>
                  {entries.map(([opt,cnt])=>{
                    const pct=t>0?Math.round(cnt/t*100):0;
                    return (<div key={opt} style={{marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:13,color:"#374151"}}>{opt}</span>
                        <span style={{fontSize:13,fontWeight:700,color:s.color}}>{pct}% ({cnt}명)</span>
                      </div>
                      <div className="bar-wrap"><div className="bar-fill" style={{background:cnt===mx?s.color:`${s.color}99`,width:`${pct}%`,minWidth:cnt>0?4:0}}/></div>
                    </div>);
                  })}
                </div>
              );
            })}
            {s.questions.filter(q=>q.type==="open").map(q=>{
              const opens=results.responses.map(r=>r[q.id]).filter(Boolean);
              if(!opens.length) return null;
              return (<div key={q.id} className="qcard">
                <div style={{fontSize:14,fontWeight:700,color:"#111",marginBottom:14}}>주관식 응답 ({opens.length}건)</div>
                {opens.map((txt,i)=><div key={i} style={{padding:"10px 14px",background:"#f5f5f5",borderRadius:8,marginBottom:8,fontSize:13,color:"#374151",borderLeft:`3px solid ${s.color}`}}>{txt}</div>)}
              </div>);
            })}
          </div>
        )) : null}

        <div className="nav-row" style={{marginTop:16}}>
          <button className="btn btn-outline" style={{flex:1}} onClick={()=>setView("survey")}>← 설문으로</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={loadResults}>🔄 새로고침</button>
        </div>

        {results && (()=>{
          const emails=results.responses.filter(r=>r.q_email&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(r.q_email)).map(r=>({email:r.q_email,beta:r.q_beta||"-"}));
          if(!emails.length) return <div style={{marginTop:24,background:"#fff",borderRadius:14,padding:20,border:"1px solid #e5e5e5",textAlign:"center"}}><span style={{fontSize:13,color:"#888"}}>📭 아직 이메일 수집이 없어요.</span></div>;
          return (<div className="email-list">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <span style={{fontSize:15,fontWeight:700,color:"#111"}}>📩 베타 신청 이메일 목록</span>
              <span style={{background:"#dcfce7",color:"#16a34a",fontSize:13,fontWeight:700,padding:"4px 14px",borderRadius:20}}>{emails.length}명</span>
            </div>
            {emails.map((e,i)=><div key={i} className="email-item">
              <span style={{fontSize:14,color:"#374151",fontWeight:500}}>{e.email}</span>
              <span style={{fontSize:11,color:"#16a34a",background:"#dcfce7",padding:"2px 8px",borderRadius:8}}>{e.beta==="꼭 참여하고 싶다"?"🔥 적극 참여":"👀 관심 있음"}</span>
            </div>)}
          </div>);
        })()}
      </div>
    </div>
  );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
